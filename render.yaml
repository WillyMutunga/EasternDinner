services:
  - type: web
    name: dinner-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: /data/database.sqlite
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: dinner-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: dinner-backend
          type: web
          property: url
