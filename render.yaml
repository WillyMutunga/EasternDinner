services:
  - type: web
    name: dinner-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dinner-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://dinner-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: dinner-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: VITE_API_URL
        value: https://dinner-backend-1khi.onrender.com

databases:
  - name: dinner-db
    plan: free
    databaseName: dinner
    user: dinner_user
